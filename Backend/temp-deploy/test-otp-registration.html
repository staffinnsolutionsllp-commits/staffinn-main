<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration OTP Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-full {
            width: 100%;
            padding: 14px;
            font-size: 16px;
        }

        .verified {
            color: #10b981;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }

        .message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }

        .hidden {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .step {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .step-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Register as Staff</h1>
        <p class="subtitle">Start filling out the form to become a quality staff member!</p>

        <div id="message" class="message hidden"></div>

        <form id="registrationForm">
            <!-- Step 1: Email Verification -->
            <div class="step">
                <div class="step-title">Step 1: Verify Your Email</div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <div class="input-group">
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required
                            placeholder="your.email@example.com"
                        >
                        <button type="button" id="sendOtpBtn" onclick="sendOTP()">
                            Send OTP
                        </button>
                    </div>
                </div>

                <div id="otpSection" class="form-group hidden">
                    <label>Enter OTP *</label>
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="otp" 
                            maxlength="6" 
                            placeholder="Enter 6-digit OTP"
                        >
                        <button type="button" id="verifyOtpBtn" onclick="verifyOTP()">
                            Verify OTP
                        </button>
                    </div>
                </div>

                <div id="verifiedSection" class="verified hidden">
                    ✓ Email Verified Successfully
                </div>
            </div>

            <!-- Step 2: Personal Information -->
            <div class="step">
                <div class="step-title">Step 2: Personal Information</div>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        required
                        placeholder="John Doe"
                    >
                </div>

                <div class="form-group">
                    <label>Phone Number *</label>
                    <input 
                        type="tel" 
                        id="phoneNumber" 
                        name="phoneNumber" 
                        required
                        placeholder="9876543210"
                    >
                </div>

                <div class="form-group">
                    <label>Password *</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        placeholder="Minimum 6 characters"
                    >
                </div>

                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        required
                        placeholder="Re-enter your password"
                    >
                </div>
            </div>

            <button type="submit" id="registerBtn" class="btn-full" disabled>
                Register
            </button>
        </form>
    </div>

    <script>
        const API_BASE = 'http://localhost:4001/api';
        let emailVerified = false;

        function showMessage(text, type = 'info') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.classList.remove('hidden');
            
            setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 5000);
        }

        function setLoading(buttonId, loading) {
            const btn = document.getElementById(buttonId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>';
            } else {
                btn.disabled = false;
                btn.textContent = buttonId === 'sendOtpBtn' ? 'Send OTP' : 
                                  buttonId === 'verifyOtpBtn' ? 'Verify OTP' : 'Register';
            }
        }

        async function sendOTP() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }

            setLoading('sendOtpBtn', true);

            try {
                const response = await fetch(`${API_BASE}/auth/send-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('OTP sent to your email!', 'success');
                    document.getElementById('email').disabled = true;
                    document.getElementById('otpSection').classList.remove('hidden');
                    document.getElementById('sendOtpBtn').textContent = 'Resend OTP';
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Failed to send OTP. Please try again.', 'error');
            } finally {
                setLoading('sendOtpBtn', false);
            }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;

            if (!otp) {
                showMessage('Please enter the OTP', 'error');
                return;
            }

            setLoading('verifyOtpBtn', true);

            try {
                const response = await fetch(`${API_BASE}/auth/verify-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Email verified successfully!', 'success');
                    emailVerified = true;
                    document.getElementById('otpSection').classList.add('hidden');
                    document.getElementById('verifiedSection').classList.remove('hidden');
                    document.getElementById('registerBtn').disabled = false;
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Failed to verify OTP. Please try again.', 'error');
            } finally {
                setLoading('verifyOtpBtn', false);
            }
        }

        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!emailVerified) {
                showMessage('Please verify your email first', 'error');
                return;
            }

            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value,
                phoneNumber: document.getElementById('phoneNumber').value
            };

            if (formData.password !== formData.confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            setLoading('registerBtn', true);

            try {
                const response = await fetch(`${API_BASE}/staff/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Registration successful! Redirecting...', 'success');
                    
                    // Store tokens
                    localStorage.setItem('accessToken', data.data.accessToken);
                    localStorage.setItem('refreshToken', data.data.refreshToken);
                    
                    setTimeout(() => {
                        alert('Registration complete! Check console for tokens.');
                        console.log('User Data:', data.data.user);
                        console.log('Access Token:', data.data.accessToken);
                    }, 1500);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Registration failed. Please try again.', 'error');
            } finally {
                setLoading('registerBtn', false);
            }
        });
    </script>
</body>
</html>
