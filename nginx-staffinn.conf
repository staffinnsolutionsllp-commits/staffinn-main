# HTTP Server (ALB health check + proxy)
server {
    listen 80;
    server_name api.staffinn.com staffinn.com www.staffinn.com localhost _;

    # Increase max upload size to 50MB
    client_max_body_size 50M;
    client_body_buffer_size 50M;

    # Health check endpoint for ALB
    location = /health {
        default_type application/json;
        return 200 '{"status":"healthy"}';
    }

    # Proxy all requests to backend (ALB handles HTTPS)
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase proxy timeouts for large uploads
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }
}
